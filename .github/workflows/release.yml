name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration-tests:
    name: Full test suite (incl. integration)
    runs-on: ubuntu-latest
    # The integration tests hit the real proxy6.net API, so we use an
    # environment whose secret can be reviewed/required-approved separately
    # from regular CI secrets.
    environment: release
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run full test suite (unit + integration)
        env:
          PROXY6_API_KEY: ${{ secrets.PROXY6_API_KEY }}
        run: uv run pytest -v
