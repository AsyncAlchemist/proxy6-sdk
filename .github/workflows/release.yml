name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration-tests:
    name: Full test suite (incl. integration)
    runs-on: ubuntu-latest
    # ``release`` is a protected environment so the PROXY6_API_KEY secret
    # can be reviewed/required-approved independently of regular CI.
    environment: release
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run full test suite (unit + integration)
        env:
          PROXY6_API_KEY: ${{ secrets.PROXY6_API_KEY }}
        run: uv run pytest -v

  build:
    name: Build distributions
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify tag matches package version (release only)
        if: github.event_name == 'release'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(uv run --with tomli python -c "import tomli,pathlib; print(tomli.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          TAG="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag '$TAG' does not match pyproject version '$PKG_VERSION'" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    # Manual dry-run path: workflow_dispatch lets you exercise the publish
    # pipeline against TestPyPI without cutting a real GitHub Release.
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/proxy6-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    # Real publish path: only fires on a published GitHub Release.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/proxy6-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
