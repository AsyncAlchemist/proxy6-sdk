name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration-tests:
    name: Full test suite (incl. integration)
    runs-on: ubuntu-latest
    # ``release`` is a protected environment so the PROXY6_API_KEY secret
    # can be reviewed/required-approved independently of regular CI.
    environment: release
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run full test suite (unit + integration)
        env:
          PROXY6_API_KEY: ${{ secrets.PROXY6_API_KEY }}
        run: uv run pytest -v

  publish-pypi:
    name: Build & publish to PyPI
    # Only fire on a real GitHub Release publish — workflow_dispatch runs
    # exercise the test job above but never push to PyPI.
    if: github.event_name == 'release'
    needs: integration-tests
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/proxy6-sdk
    permissions:
      # Required for PyPI Trusted Publishing (OIDC). No long-lived token.
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify tag matches package version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(uv run --with tomli python -c "import tomli,pathlib; print(tomli.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          TAG="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag '$TAG' does not match pyproject version '$PKG_VERSION'" >&2
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
